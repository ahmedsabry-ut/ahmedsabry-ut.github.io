repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files

  - repo: https://github.com/errata-ai/vale
    rev: v3.12.0
    hooks:
      - id: vale
        files: \.(md|mdx|rst|txt)$
        exclude: ^\.vale/styles/config/vocabularies/.*/accept\.txt$

  - repo: local
    hooks:
      - id: check-post-structure
        name: check post structure
        entry: python3 scripts/check_post_structure.py
        language: system
        pass_filenames: false
        files: ^_posts/.*\.md$
